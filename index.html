<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0, user-scalable=no">
<title>Memory Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Fredoka:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#27aee8;
    --card:#ffffff;
    --shadow:#064f86;
    --deep:#053f73;
    --popup:#ffffff;
    --green:#43c768;
    --red:#ff5b5b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; min-height:100%; }
  body {
    font-family:'Quicksand', Arial, sans-serif;
    background:var(--bg);
    color:#073b63;
    overflow-x:hidden;
    touch-action:manipulation;
  }
  .game-wrap {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px 16px 24px;
    position:relative;
    overflow:hidden;
  }
  .title {
    font-family:'Fredoka','Arial Rounded MT Bold',Arial,sans-serif;
    font-size:clamp(44px, 8vw, 96px);
    line-height:.9;
    color:#fff;
    letter-spacing:3px;
    text-align:center;
    margin:4px 0 18px;
    text-transform:uppercase;
    text-shadow:
      0 6px 0 #1184c3,
      0 10px 0 rgba(4,64,118,.55),
      0 14px 18px rgba(0,0,0,.18);
    -webkit-text-stroke:2px rgba(255,255,255,.2);
  }
  .top-bar {
    width:min(820px,96vw);
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    color:white;
    font-weight:700;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .pill {
    background:rgba(255,255,255,.22);
    border:2px solid rgba(255,255,255,.38);
    border-radius:999px;
    padding:8px 14px;
    backdrop-filter: blur(4px);
  }
  .grid {
    width:min(820px,96vw);
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:14px;
    perspective:1000px;
  }
  .card {
    position:relative;
    aspect-ratio:1/1;
    border:0;
    background:transparent;
    cursor:pointer;
    perspective:1000px;
    outline:none;
  }
  .card-inner {
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .45s cubic-bezier(.22,.9,.34,1.18);
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform:rotateY(180deg);
  }
  .card-face {
    position:absolute;
    inset:0;
    border-radius:13px;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:var(--card);
    border:2px solid rgba(2,88,145,.18);
    box-shadow:
      8px 8px 0 var(--shadow),
      0 5px 12px rgba(0,0,0,.12);
  }
  .front {
    background:linear-gradient(145deg,#ffffff 0%,#eef9ff 100%);
  }
  .front::before {
    content:"?";
    font-family:'Fredoka', Arial, sans-serif;
    font-size:clamp(42px, 7vw, 70px);
    color:#19a8e6;
    text-shadow:0 4px 0 #d6f3ff;
  }
  .back {
    transform:rotateY(180deg);
    background:#fff;
    padding:8%;
  }
  .food-img {
    max-width:90%;
    max-height:88%;
    object-fit:contain;
    display:block;
    filter: drop-shadow(0 2px 1px rgba(0,0,0,.07));
    transform:scale(1.02);
  }
  .card.matched .card-face {
    box-shadow:
      8px 8px 0 #046da5,
      0 0 0 4px rgba(255,255,255,.48),
      0 5px 12px rgba(0,0,0,.12);
  }
  .overlay {
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(3,43,80,.35);
    z-index:20;
    padding:16px;
  }
  .overlay.show { display:flex; }
  .popup {
    width:min(540px, 94vw);
    background:var(--popup);
    border-radius:26px;
    box-shadow:0 18px 45px rgba(0,0,0,.24);
    padding:26px;
    text-align:center;
    animation:popIn .25s ease-out;
    border:4px solid rgba(255,255,255,.75);
  }
  @keyframes popIn {
    from { transform:scale(.82); opacity:0; }
    to { transform:scale(1); opacity:1; }
  }
  .popup h2 {
    font-family:'Fredoka', Arial, sans-serif;
    color:#0a73b4;
    margin-bottom:12px;
    font-size:30px;
  }
  .question {
    font-size:clamp(20px,3vw,26px);
    line-height:1.35;
    font-weight:700;
    color:#0a3558;
    margin:14px 0 18px;
  }
  .answers {
    display:grid;
    gap:11px;
    margin-top:12px;
  }
  .answer-btn {
    border:0;
    border-radius:16px;
    padding:14px 16px;
    background:#eaf7ff;
    color:#073b63;
    font-size:20px;
    font-weight:700;
    font-family:'Quicksand', Arial, sans-serif;
    cursor:pointer;
    box-shadow:0 4px 0 #a8daf5;
    transition:transform .12s, background .12s, box-shadow .12s;
    text-align:left;
  }
  .answer-btn:hover { transform:translateY(-1px); }
  .answer-btn.correct {
    background:#d9ffd8;
    color:#136b2a;
    box-shadow:0 4px 0 #5fcb72;
  }
  .answer-btn.wrong {
    background:#ffe0e0;
    color:#9d1616;
    box-shadow:0 4px 0 #ff8484;
  }
  .feedback {
    min-height:36px;
    margin-top:14px;
    font-size:24px;
    font-weight:800;
  }
  .feedback.good { color:#1ea848; }
  .feedback.bad { color:#e63d3d; }
  .continue-btn, .play-again {
    display:none;
    margin:15px auto 0;
    border:0;
    border-radius:18px;
    background:#0a9ce0;
    color:#fff;
    padding:14px 26px;
    font-family:'Fredoka', Arial, sans-serif;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 5px 0 #046da5;
  }
  .continue-btn.show { display:block; }
  .celebration {
    position:fixed;
    inset:0;
    z-index:30;
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    background:linear-gradient(135deg, rgba(39,174,232,.93), rgba(10,124,196,.96));
    overflow:hidden;
  }
  .celebration.show { display:flex; }
  .cele-card {
    position:relative;
    z-index:2;
    background:#fff;
    border-radius:30px;
    padding:34px 28px;
    width:min(560px,94vw);
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .cele-card h2 {
    font-family:'Fredoka', Arial, sans-serif;
    color:#0b75b6;
    font-size:clamp(34px,6vw,58px);
    line-height:1;
    margin-bottom:15px;
  }
  .cele-card p {
    font-size:22px;
    font-weight:700;
    color:#073b63;
    line-height:1.35;
  }
  .play-again {
    display:inline-block;
    margin-top:24px;
  }
  .confetti {
    position:absolute;
    top:-20px;
    width:12px;
    height:18px;
    border-radius:4px;
    animation:fall linear forwards;
    opacity:.95;
  }
  @keyframes fall {
    to { transform:translateY(110vh) rotate(720deg); }
  }
  @media (max-width:640px) {
    .game-wrap { padding:12px 10px 20px; }
    .grid { gap:10px; }
    .card-face { border-radius:10px; box-shadow:6px 6px 0 var(--shadow),0 4px 10px rgba(0,0,0,.12); }
    .card.matched .card-face { box-shadow:6px 6px 0 #046da5,0 0 0 3px rgba(255,255,255,.48),0 4px 10px rgba(0,0,0,.12); }
    .top-bar { font-size:14px; }
    .pill { padding:6px 10px; }
    .popup { padding:20px 16px; }
    .answer-btn { font-size:18px; padding:12px 14px; }
  }


/* === STRICT 1200 × 640 px GENIALLY FORMAT ===
   Fixed canvas: no vertical scroll. Everything is resized to fit. */
html, body {
  width: 1200px !important;
  height: 640px !important;
  min-width: 1200px !important;
  min-height: 640px !important;
  max-width: 1200px !important;
  max-height: 640px !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  background: var(--bg) !important;
}
body {
  position: relative !important;
}
.game-wrap {
  width: 1200px !important;
  height: 640px !important;
  min-width: 1200px !important;
  min-height: 640px !important;
  max-width: 1200px !important;
  max-height: 640px !important;
  padding: 6px 0 0 !important;
  margin: 0 !important;
  overflow: hidden !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: flex-start !important;
}
.title {
  font-size: 46px !important;
  line-height: 0.9 !important;
  margin: 0 0 6px !important;
  letter-spacing: 2px !important;
  text-shadow: 0 3px 0 #1184c3, 0 6px 0 rgba(4,64,118,.55), 0 8px 10px rgba(0,0,0,.16) !important;
  -webkit-text-stroke: 1px rgba(255,255,255,.2) !important;
}
.top-bar {
  width: 560px !important;
  height: 30px !important;
  margin: 0 0 7px !important;
  font-size: 15px !important;
}
.pill {
  padding: 4px 11px !important;
  border-width: 2px !important;
}
.grid {
  width: 540px !important;
  height: 540px !important;
  display: grid !important;
  grid-template-columns: repeat(4, 126px) !important;
  grid-template-rows: repeat(4, 126px) !important;
  gap: 12px !important;
  margin: 0 auto !important;
  perspective: 1000px !important;
}
.card {
  width: 126px !important;
  height: 126px !important;
  aspect-ratio: auto !important;
}
.card-face {
  border-radius: 12px !important;
  border: 2px solid rgba(2,88,145,.18) !important;
  box-shadow: 6px 6px 0 var(--shadow), 0 4px 10px rgba(0,0,0,.12) !important;
}
.card.matched .card-face {
  box-shadow: 6px 6px 0 #046da5, 0 0 0 3px rgba(255,255,255,.48), 0 4px 10px rgba(0,0,0,.12) !important;
}
.front::before {
  font-size: 54px !important;
}
.back {
  padding: 7% !important;
}
.food-img {
  max-width: 92% !important;
  max-height: 90% !important;
}
.overlay, .celebration {
  position: absolute !important;
  inset: 0 !important;
  width: 1200px !important;
  height: 640px !important;
  padding: 0 !important;
  overflow: hidden !important;
}
.popup {
  width: 520px !important;
  max-height: 590px !important;
  padding: 22px !important;
  border-radius: 24px !important;
}
.popup h2 { font-size: 28px !important; margin-bottom: 8px !important; }
.question { font-size: 22px !important; margin: 10px 0 14px !important; }
.answers { gap: 9px !important; margin-top: 8px !important; }
.answer-btn { font-size: 18px !important; padding: 12px 14px !important; border-radius: 14px !important; }
.feedback { min-height: 30px !important; margin-top: 10px !important; font-size: 22px !important; }
.continue-btn, .play-again { font-size: 20px !important; padding: 12px 24px !important; margin-top: 12px !important; }
.cele-card { width: 520px !important; padding: 28px 24px !important; }
.cele-card h2 { font-size: 44px !important; }
.cele-card p { font-size: 20px !important; }
@media (max-width: 640px) {
  html, body { width: 1200px !important; height: 640px !important; }
  .game-wrap { width: 1200px !important; height: 640px !important; padding: 6px 0 0 !important; }
  .grid { width: 540px !important; height: 540px !important; grid-template-columns: repeat(4,126px) !important; grid-template-rows: repeat(4,126px) !important; gap: 12px !important; }
  .card { width: 126px !important; height: 126px !important; }
}


/* === CENTER CARDS PATCH ===
   Keeps the fixed 1200×640 format and places the 4×4 card grid exactly in the center horizontally. */
.title {
  width: 1200px !important;
  text-align: center !important;
}
.top-bar {
  align-self: center !important;
  margin-left: auto !important;
  margin-right: auto !important;
}
.grid {
  align-self: center !important;
  justify-self: center !important;
  margin-left: auto !important;
  margin-right: auto !important;
  transform: none !important;
}
.game-wrap {
  align-items: center !important;
}

</style>
</head>
<body>
  <main class="game-wrap">
    <h1 class="title">MEMORY GAME</h1>
    <div class="top-bar">
      <div class="pill">Pairs: <span id="pairs">0</span>/8</div>
      <div class="pill">⭐ English Challenge</div>
    </div>
    <section class="grid" id="grid" aria-label="Memory card grid"></section>
  </main>

  <div class="overlay" id="quizOverlay">
    <div class="popup">
      <h2>Question Time!</h2>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <button class="continue-btn" id="continueBtn">Continue</button>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="cele-card">
      <h2>🎉 Amazing Job! 🎉</h2>
      <p>You found all the pairs and answered the questions!</p>
      <div style="font-size:46px;margin:16px 0;">⭐⭐⭐</div>
      <button class="play-again" onclick="restartGame()">🔄 Play Again</button>
    </div>
  </div>

const QUESTIONS = [{"q": "Can I have some __________, please?", "a": ["apple", "apples", "bread"], "correct": 1}, {"q": "Can I have some __________, please?", "a": ["carrots", "carrot", "milk"], "correct": 0}, {"q": "Can I have some __________, please?", "a": ["orange", "oranges", "cheese"], "correct": 1}, {"q": "Can I have some __________, please?", "a": ["tomato", "tomatoes", "rice"], "correct": 1}, {"q": "Complete the dialogue.<br><br>Can I have some pears, please?<br>How many?<br>__________, please.", "a": ["Three", "Some", "Much"], "correct": 0}, {"q": "Complete the dialogue.<br><br>Can I have some bananas, please?<br>How many?<br>__________, please.", "a": ["Five", "Any", "A"], "correct": 0}, {"q": "Complete the dialogue.<br><br>Can I have some lemons, please?<br>How many?<br>__________, please.", "a": ["Four", "Some", "Much"], "correct": 0}, {"q": "Complete the dialogue.<br><br>Can I have some mangoes, please?<br>How many?<br>__________, please.", "a": ["Two", "Any", "A"], "correct": 0}, {"q": "Challenge<br><br>Can I have some __________, please?<br>How many?<br>Six, please.", "a": ["onions", "onion", "bread"], "correct": 0}, {"q": "Challenge<br><br>Can I have some __________, please?<br>How many?<br>One, please.", "a": ["pear", "pears", "rice"], "correct": 0}];

const PAIRS = [
  {id:'hamburger', label:'Hamburger'},
  {id:'hotdog', label:'Hot dog'},
  {id:'fries', label:'French fries'},
  {id:'pizza', label:'Pizza slice'},
  {id:'icecream', label:'Ice cream'},
  {id:'taco', label:'Taco'},
  {id:'milkshake', label:'Milkshake'},
  {id:'cupcake', label:'Cupcake'}
];

let deck = [];
let flipped = [];
let lockBoard = false;
let matchedPairs = 0;
let quizOrder = [];
let currentQuiz = null;

const grid = document.getElementById('grid');
const pairsEl = document.getElementById('pairs');
const overlay = document.getElementById('quizOverlay');
const questionText = document.getElementById('questionText');
const answersEl = document.getElementById('answers');
const feedback = document.getElementById('feedback');
const continueBtn = document.getElementById('continueBtn');
const celebration = document.getElementById('celebration');

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function buildDeck() {
  deck = shuffle(PAIRS.flatMap(item => [
    {...item, uid:item.id + '-1'},
    {...item, uid:item.id + '-2'}
  ]));
}

function buildQuizOrder() {
  quizOrder = shuffle([...Array(QUESTIONS.length).keys()]);
}

function initGame() {
  matchedPairs = 0;
  flipped = [];
  lockBoard = false;
  pairsEl.textContent = '0';
  celebration.classList.remove('show');
  overlay.classList.remove('show');
  buildDeck();
  buildQuizOrder();
  grid.innerHTML = '';
  deck.forEach(card => {
    const btn = document.createElement('button');
    btn.className = 'card';
    btn.type = 'button';
    btn.dataset.id = card.id;
    btn.dataset.uid = card.uid;
    btn.setAttribute('aria-label','Memory card');
    btn.innerHTML = `
      <div class="card-inner">
        <div class="card-face front"></div>
        <div class="card-face back">
          <img class="food-img" src="${FOOD_IMAGES[card.id]}" alt="${card.label}">
        </div>
      </div>
    `;
    btn.addEventListener('click', () => flipCard(btn));
    grid.appendChild(btn);
  });
}

function flipCard(card) {
  if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  playTone(390, .06, 'sine', .05);
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) checkMatch();
}

function checkMatch() {
  const [a,b] = flipped;
  if (a.dataset.id === b.dataset.id) {
    a.classList.add('matched');
    b.classList.add('matched');
    matchedPairs++;
    pairsEl.textContent = matchedPairs;
    playDing();
    setTimeout(showQuiz, 450);
    flipped = [];
  } else {
    lockBoard = true;
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped = [];
      lockBoard = false;
    }, 850);
  }
}

function showQuiz() {
  lockBoard = true;
  if (!quizOrder.length) buildQuizOrder();
  currentQuiz = QUESTIONS[quizOrder.pop()];
  questionText.innerHTML = currentQuiz.q;
  answersEl.innerHTML = '';
  feedback.textContent = '';
  feedback.className = 'feedback';
  continueBtn.classList.remove('show');
  currentQuiz.a.forEach((answer, index) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.type = 'button';
    btn.innerHTML = String.fromCharCode(97 + index) + ') ' + answer;
    btn.addEventListener('click', () => chooseAnswer(btn, index));
    answersEl.appendChild(btn);
  });
  overlay.classList.add('show');
}

function chooseAnswer(btn, index) {
  if (btn.classList.contains('correct')) return;
  if (index === currentQuiz.correct) {
    btn.classList.add('correct');
    feedback.textContent = 'Excellent! ⭐';
    feedback.className = 'feedback good';
    playSuccess();
    Array.from(answersEl.children).forEach(b => b.disabled = true);
    continueBtn.classList.add('show');
  } else {
    btn.classList.add('wrong');
    feedback.textContent = 'Try again!';
    feedback.className = 'feedback bad';
    playTone(160, .14, 'sawtooth', .035);
    setTimeout(() => btn.classList.remove('wrong'), 650);
  }
}

continueBtn.addEventListener('click', () => {
  overlay.classList.remove('show');
  lockBoard = false;
  if (matchedPairs === 8) {
    setTimeout(showCelebration, 250);
  }
});

function showCelebration() {
  celebration.classList.add('show');
  createConfetti();
  playVictory();
}

function createConfetti() {
  celebration.querySelectorAll('.confetti').forEach(el => el.remove());
  const colors = ['#fff','#ffd33d','#ff5b9d','#77e255','#ff8a00','#7bdcff'];
  for (let i=0; i<90; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.3 + Math.random()*2.4) + 's';
    c.style.animationDelay = (Math.random()*1.2) + 's';
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    celebration.appendChild(c);
  }
}

function restartGame() {
  initGame();
}

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq=440, duration=.1, type='sine', volume=.04) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playDing() {
  playTone(660,.09,'sine',.05);
  setTimeout(()=>playTone(880,.12,'sine',.045),90);
}
function playSuccess() {
  playTone(520,.08,'triangle',.05);
  setTimeout(()=>playTone(780,.08,'triangle',.05),90);
  setTimeout(()=>playTone(1040,.13,'triangle',.05),180);
}
function playVictory() {
  [523,659,784,1046].forEach((f,i)=>setTimeout(()=>playTone(f,.16,'triangle',.05),i*130));
}

initGame();
